spring:
  application:
    name: pedidos

  datasource:
    url: jdbc:postgresql://localhost:5432/pedidos_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# Configuração da API externa (ViaCEP como exemplo)
cliente:
  viacep:
    base-url: https://viacep.com.br/ws

management:
  endpoints:
    web:
      exposure:
        include: health,info
