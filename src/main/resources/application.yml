spring:
  application:
    name: saldo-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:saldos_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Em prod: validate. Em dev: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# Configurações da aplicação
app:
  aws:
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY_ID:local}
    secret-key: ${AWS_SECRET_ACCESS_KEY:local}
    endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}   # Para LocalStack: http://localhost:4566

  sqs:
    queue-name: ${SQS_QUEUE_NAME:saldos-queue}

logging:
  level:
    com.example.saldo: INFO
    io.awspring.cloud.sqs: DEBUG
